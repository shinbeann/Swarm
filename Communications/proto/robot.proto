syntax = "proto3";
package swarm;

option go_package = "github.com/yihre/swarm-project/communications;communications";

service RobotService {
  // robot requests to move to an absolute target position with a desired final orientation.
  // The WorldEngine moves the robot toward the target over time and has final authority over the actual position.
  rpc MoveToPosition(MoveRequest) returns (MoveResponse);
  // robot requests for sensor data from the world.
  rpc GetSensorData(SensorRequest) returns (SensorResponse);
  // robot requests for network data from the world.
  rpc GetNetworkData(NetworkRequest) returns (NetworkResponse);
  // robot sends a heartbeat to the world to indicate that it is still alive.
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message MoveRequest {
  string robot_id = 1;
  // Absolute target position in world coordinates
  double target_x = 2;
  double target_y = 3;
  // Desired heading (radians) when the robot arrives at the target
  double desired_heading = 4;
}

message MoveResponse {
  bool success = 1;
}

message SensorRequest {
  string robot_id = 1;
}

message ObjectData {
  string id = 1;
  double x = 2;
  double y = 3;
  string type = 4;
}

message SensorResponse {
  repeated ObjectData objects = 1;
}

message NetworkRequest {
  string robot_id = 1;
}

message NetworkData {
  string target_robot_id = 1;
  double bandwidth = 2;
  double latency = 3;
  double reliability = 4;
}

message NetworkResponse {
  repeated NetworkData network_conditions = 1;
  bool simulation_paused = 2;
}

message HeartbeatRequest {
  string robot_id = 1;
  double x = 2;
  double y = 3;
  double heading = 4;
  // Leader ID this robot currently believes is authoritative.
  // Empty when no leader is currently known.
  string known_leader_id = 5;
}

message HeartbeatResponse {
  bool success = 1;
  // Canonical position and heading as maintained by the WorldEngine
  double x = 2;
  double y = 3;
  double heading = 4;
}

// PeerService is hosted by the robots to communicate heavily constrained data with neighbors
service PeerService {
  rpc SyncData(PeerSyncRequest) returns (PeerSyncResponse);
  rpc RouteMessage(RoutedMessageRequest) returns (RoutedMessageResponse);
}

// RaftService is hosted by robots for dedicated leader election and log replication traffic.
service RaftService {
  rpc RequestVote(VoteRequest) returns (VoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
}

message PeerSyncRequest {
  string sender_id = 1;
  bytes payload = 2; // For simulating large payloads (e.g. map sync)
  int64 lamport_clock = 3;
}

message PeerSyncResponse {
  bool received = 1;
}

message RoutedMessageRequest {
  string source_id = 1;       // Original sender
  string destination_id = 2;  // Final target
  string message_type = 3;    // "RequestVote", "VoteResponse", "AppendEntries", "AppendEntriesResponse"
  bytes payload = 4;          // Serialized inner RPC message
  int32 ttl = 5;              // Decremented each hop; dropped at 0
}

message RoutedMessageResponse {
  bool delivered = 1;         // Whether the message reached its destination
  bytes response_payload = 2; // Serialized response from destination (for request/response RPCs)
}

message VoteRequest {
  int64 term = 1;
  string candidate_id = 2;
  int64 last_log_index = 3;
  int64 last_log_term = 4;
}

message VoteResponse {
  int64 term = 1;
  bool vote_granted = 2;
}

message RaftLogEntry {
  int64 term = 1;
  bytes command = 2;
  string log_type = 3;
  int64 timestamp_unix_ms = 4;
}

message AppendEntriesRequest {
  int64 term = 1;
  string leader_id = 2;
  int64 prev_log_index = 3;
  int64 prev_log_term = 4;
  repeated RaftLogEntry entries = 5;
  int64 leader_commit = 6;
}

message AppendEntriesResponse {
  int64 term = 1;
  bool success = 2;
}
