syntax = "proto3";
package swarm;

option go_package = "github.com/yihre/swarm-project/communications;communications";

service VisualiserService {
  // visualiser requests for environment data from the world.
  rpc GetEnvironmentData(EnvironmentRequest) returns (EnvironmentResponse);
  // visualiser requests for robot data relevant to the visualiser from the world.
  rpc GetRobotData(RobotDataRequest) returns (RobotDataResponse);
  // visualiser toggles simulation pause state across world and robots.
  rpc SetSimulationPause(SimulationPauseRequest) returns (SimulationPauseResponse);
  // visualiser requests the latest leader raft log snapshot.
  rpc GetLeaderLog(LeaderLogRequest) returns (LeaderLogResponse);
  // visualiser removes a random robot from the simulation and signals it to shut down.
  rpc KillRandomRobot(KillRandomRobotRequest) returns (KillRandomRobotResponse);
}

message EnvironmentRequest {}

message EnvironmentResponse {
  double width = 1;
  double height = 2;
  repeated Obstacle obstacles = 3;
  bool is_paused = 4;
}

message SimulationPauseRequest {
  bool pause = 1;
}

message SimulationPauseResponse {
  bool success = 1;
  bool is_paused = 2;
}

message Obstacle {
  string id = 1;
  double x = 2;
  double y = 3;
  double width = 4;
  double height = 5;
}

message RobotDataRequest {}

message RobotInfo {
  string id = 1;
  double x = 2;
  double y = 3;
  double heading = 4;
  bool is_leader = 5;
  double communication_range = 6;
  repeated string in_range_peer_ids = 7;
  int64 raft_term = 8;
  int64 raft_log_index = 9;
  int64 commit_index = 10;
}

message RobotDataResponse {
  repeated RobotInfo robots = 1;
}

message LeaderLogRequest {}

enum LeaderLogStatus {
  LEADER_LOG_STATUS_UNSPECIFIED = 0;
  LEADER_LOG_STATUS_PENDING_CONFIRMATION = 1;
  LEADER_LOG_STATUS_CONFIRMED = 2;
}

message LeaderLogEntry {
  string current_leader = 1;
  int64 term = 2;
  int64 index = 3;
  string message = 4;
  LeaderLogStatus status = 5;
  int64 timestamp_unix_ms = 6;
}

message LeaderLogResponse {
  string current_leader = 1;
  int64 current_term = 2;
  repeated LeaderLogEntry entries = 3;
}

message KillRandomRobotRequest {}

message KillRandomRobotResponse {
  bool success = 1;
  string killed_robot_id = 2;
  string error = 3;
}
