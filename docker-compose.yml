version: '3.8'

services:
  world-engine:
    build:
      context: .
      dockerfile: WorldEngine/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - swarm-net
    container_name: world-engine

  robot:
    build:
      context: .
      dockerfile: Robot/Dockerfile
    # Robot will derive a unique ID from the container hostname when not provided.
    command: [ "--world-engine=world-engine:50051" ]
    environment:
      ROBOT_TOTAL_NODES: 9
    depends_on:
      - world-engine
    networks:
      - swarm-net
    deploy:
     replicas: 9

  visualiser:
    build:
      context: .
      dockerfile: Visualiser/Dockerfile
    ports:
      - "3001:8080"
    depends_on:
      - world-engine
    networks:
      - swarm-net

networks:
  swarm-net:
    driver: bridge
